<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <lucide-icon name="plane" [size]="48"></lucide-icon>
    </div>
    <h1 class="login-title">FlightTrack</h1>
    <p class="login-subtitle">Real-Time Flight Tracking System</p>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="form-group">
        <label for="port">WebSocket Server Port</label>
        <input
          id="port"
          type="number"
          [(ngModel)]="port"
          name="port"
          placeholder="3000"
          min="1024"
          max="49151"
          required
        />
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" class="login-btn" [disabled]="loading">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading">Connecting...</span>
      </button>

    </form>
  </div>
</div>
